name: DIAG adb reverse connectivity

# Temporary diagnostic. workflow_dispatch alone isn't reachable via API/CLI
# until this file exists on the default branch, so it's scoped to push on
# this feature branch instead — fires once per push while this is here.
# Delete once the Android e2e adb-reverse investigation is resolved.
on:
  workflow_dispatch:
  push:
    branches:
      - detox-e2e-example

jobs:
  diag:
    name: adb reverse nc connectivity
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install libpulse0
        run: sudo apt-get update -qq && sudo apt-get install -y libpulse0

      - name: Boot emulator and test adb reverse connectivity
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_7
          disable-animations: true
          avd-name: Pixel_10_Pro
          # android-emulator-runner runs each line of a multi-line `script`
          # as its own separate shell invocation, so this has to be one
          # joined line to keep shell state consistent throughout.
          #
          # Just the zero-io connectivity check (-z): a separate data-
          # transfer variant proved flaky even against my known-working
          # local setup (toybox nc + adb shell piping quirks), so it's not
          # a trustworthy signal either way. -z only asks "does the TCP
          # handshake through the reversed port succeed at all" — verified
          # locally to reliably report exit 0 on a setup where Detox's own
          # (much heavier) websocket traffic already works fine.
          script: echo "=== adb reverse ===" && adb reverse tcp:9999 tcp:9999 && echo "=== starting host listener on 9999 ===" && (nc -l 9999 &) && sleep 1 && echo "=== zero-io connectivity test (guest -> host reversed port) ===" && adb shell "nc -z -w 3 localhost 9999; echo GUEST_NC_EXIT=\$?" && adb reverse --remove tcp:9999 && echo "=== done ==="
