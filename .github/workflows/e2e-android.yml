name: E2E Android

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main

jobs:
  e2e-android:
    name: Detox E2E (Android)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate native Android project
        # DETOX_E2E_BUILD gates a network security config (see
        # plugins/withDetoxAndroid.js) that allows cleartext traffic to
        # 10.0.2.2 — the emulator's own host alias. Android blocks
        # cleartext to any non-loopback address by default, which is what
        # was actually breaking the app<->Detox-server connection: `adb
        # reverse`'s tunneled "localhost" is exempt (loopback), but this
        # runner's adb-reverse tunnel itself never passes traffic, and the
        # obvious fallback address (10.0.2.2) isn't loopback so the app
        # silently refused to even attempt the connection to it.
        run: DETOX_E2E_BUILD=true npx expo prebuild --platform android

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Build Detox Android app + test APKs
        run: pnpm e2e:build:android

      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install libpulse0
        # Without it, `emulator -version` fails and Detox can't detect the
        # emulator version — which makes it skip the adb-reverse port patch
        # it applies for older emulators, breaking the app<->host websocket.
        run: sudo apt-get update -qq && sudo apt-get install -y libpulse0

      - name: Run Detox tests on Android emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_7
          disable-animations: true
          avd-name: Pixel_10_Pro
          # android-emulator-runner runs each line of a multi-line `script`
          # as its own separate shell invocation (and aborts the step on the
          # first non-zero one) rather than as a single cohesive script, so
          # the failure-only logcat dump has to be chained on the same line.
          #
          # No `-t N` tail limit: that grabs only the last N lines of the
          # buffer and discards everything before, which previously cut off
          # the actual first-connection failure and left only the later
          # retry spam. The full buffer for one boot+test cycle is small
          # enough to just dump entirely.
          #
          # DETOX_DEVICE_SERVER_HOST=10.0.2.2 (via patches/detox.patch)
          # points the app at the emulator's own host alias instead of
          # localhost, bypassing the broken adb-reverse tunnel entirely.
          script: DETOX_DEVICE_SERVER_HOST=10.0.2.2 pnpm e2e:test:android || (echo "--- adb logcat ---"; adb logcat -d; exit 1)
