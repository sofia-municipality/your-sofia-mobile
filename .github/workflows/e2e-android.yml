name: E2E Android

# PAUSED (2026-07-23): not wired to push/PR — manual trigger only via
# `gh workflow run e2e-android.yml` (needs this file on the default branch
# first) or the Actions tab.
#
# Status: the app never completes its adb-reverse websocket handshake to
# the Detox server on ubuntu-latest. Confirmed NOT an app or Detox-config
# bug — built and ran the exact same emulator version, same app, both
# default and CI-matching launch flags locally (arm64-v8a + Apple
# Hypervisor.Framework), and it connects instantly and passes every time.
# Tried moving this job to macos-latest (same acceleration model that
# already makes the iOS job reliable) — that avoided the networking
# problem's territory entirely but hit a different wall: this project's
# uncached Gradle build alone takes 40-50+ minutes on macos-latest
# (vs. ~15-20 min on ubuntu-latest, ~1 min warm-cache locally), blowing
# through even a 60-minute job timeout before a single pass/fail cycle
# ever completed twice in a row.
#
# Revisit with either: a real fix for the Linux adb-reverse handshake, or
# a way to make the macOS build fast enough to fit a reasonable timeout
# (e.g. actionable Gradle/JVM tuning specific to macOS runners).
on:
  workflow_dispatch:

jobs:
  e2e-android:
    name: Detox E2E (Android)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate native Android project
        run: npx expo prebuild --platform android

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Build Detox Android app + test APKs
        run: pnpm e2e:build:android

      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install libpulse0
        # Without it, `emulator -version` fails and Detox can't detect the
        # emulator version — which makes it skip the adb-reverse port patch
        # it applies for older emulators, breaking the app<->host websocket.
        run: sudo apt-get update -qq && sudo apt-get install -y libpulse0

      - name: Run Detox tests on Android emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_7
          disable-animations: true
          avd-name: Pixel_10_Pro
          # android-emulator-runner runs each line of a multi-line `script`
          # as its own separate shell invocation (and aborts the step on the
          # first non-zero one) rather than as a single cohesive script, so
          # the failure-only logcat dump has to be chained on the same line.
          #
          # No `-t N` tail limit: that grabs only the last N lines of the
          # buffer and discards everything before, which previously cut off
          # the actual first-connection failure and left only the later
          # retry spam. The full buffer for one boot+test cycle is small
          # enough to just dump entirely.
          script: pnpm e2e:test:android || (echo "--- adb logcat ---"; adb logcat -d; exit 1)
