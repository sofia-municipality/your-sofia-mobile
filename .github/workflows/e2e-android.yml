name: E2E Android

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main

jobs:
  e2e-android:
    name: Detox E2E (Android)
    # ubuntu-latest's Android emulator networking is broken here: the app
    # never completes its adb-reverse websocket handshake to the Detox
    # server (confirmed not an app/Detox-config bug — same emulator
    # version, same app, same launch flags all connect instantly when
    # reproduced locally). macos-latest uses Apple's Hypervisor.Framework
    # instead of nested KVM, same as the iOS job's simulator — matches the
    # environment this was actually verified working in.
    runs-on: macos-latest
    # First run measured an uncached Gradle build alone taking ~37 minutes
    # on macos-latest (vs. ~1 min warm/~15-20 min uncached on Linux) — the
    # 45-minute budget left almost no room for the emulator to even boot,
    # and since the job got hard-cancelled the Gradle cache never got to
    # save, which would've repeated the same wall on every subsequent run.
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate native Android project
        run: npx expo prebuild --platform android

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Build Detox Android app + test APKs
        run: pnpm e2e:build:android

      - name: Run Detox tests on Android emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          # arm64-v8a, not x86_64: macos-latest runners are Apple Silicon,
          # so arm64 gets real Hypervisor.Framework acceleration (verified
          # locally on this exact combination) while x86_64 would fall back
          # to slow software translation.
          arch: arm64-v8a
          profile: pixel_7
          disable-animations: true
          avd-name: Pixel_10_Pro
          # android-emulator-runner runs each line of a multi-line `script`
          # as its own separate shell invocation (and aborts the step on the
          # first non-zero one) rather than as a single cohesive script, so
          # the failure-only logcat dump has to be chained on the same line.
          #
          # No `-t N` tail limit: that grabs only the last N lines of the
          # buffer and discards everything before, which previously cut off
          # the actual first-connection failure and left only the later
          # retry spam. The full buffer for one boot+test cycle is small
          # enough to just dump entirely.
          script: pnpm e2e:test:android || (echo "--- adb logcat ---"; adb logcat -d; exit 1)
