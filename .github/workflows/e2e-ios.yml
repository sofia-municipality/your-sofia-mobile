name: E2E iOS

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main

jobs:
  e2e-ios:
    name: Detox E2E (iOS)
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate native iOS project
        run: npx expo prebuild --platform ios

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: ios/Pods
          key: pods-${{ runner.os }}-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: |
            pods-${{ runner.os }}-

      - name: Install CocoaPods dependencies
        run: pod install
        working-directory: ios

      - name: Build Detox iOS app
        run: pnpm e2e:build:ios

      - name: Install applesimutils
        run: |
          brew tap wix/brew
          brew trust --formula wix/brew/applesimutils
          brew install applesimutils

      - name: Run Detox tests on iOS simulator
        # detox test itself passes (confirmed: "Test Suites: 1 passed, 1
        # total"), but the detox CLI process hangs indefinitely afterward —
        # its websocket server's close() times out after 10s ("Detox server
        # has been closed abruptly") without ever actually exiting the
        # process, running out the 45-minute job timeout otherwise. Kill it
        # after a generous timeout and trust the jest summary line instead
        # of the hung process's own exit code
        run: |
          perl -e 'alarm 900; exec @ARGV' pnpm e2e:test:ios 2>&1 | tee detox-ios.log
          test_exit=${PIPESTATUS[0]}
          if grep -qE "^Test Suites: [0-9]+ passed, [0-9]+ total$" detox-ios.log; then
            echo "All test suites passed — treating as success (raw exit code was $test_exit, from a hung teardown)."
            exit 0
          fi
          exit $test_exit
